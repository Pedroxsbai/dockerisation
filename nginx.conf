user laravel;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 20M;  # autoriser l'upload de CV

    server {
        listen 80;
        server_name _;
        root /var/www/html/public;
        index index.php index.html;

        # Endpoint de health check (utilisé par ECS et Docker)
        location /health {
            access_log off;
            return 200 '{"status":"ok","service":"backend"}';
            add_header Content-Type application/json;
        }

        # Laravel : tout passe par index.php
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # Exécution PHP via PHP-FPM
        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_read_timeout 60s;
        }

        # Sécurité : interdire l'accès aux fichiers sensibles
        location ~ /\.(?!well-known) {
            deny all;
        }

        # Cache assets
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        gzip on;
        gzip_types text/plain text/css application/json application/javascript
                   text/xml application/xml text/javascript;
    }
}
