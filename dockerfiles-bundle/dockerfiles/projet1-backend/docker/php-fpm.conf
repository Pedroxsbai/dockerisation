[www]
user = laravel
group = laravel

listen = 127.0.0.1:9000
listen.owner = laravel
listen.group = laravel

; Process manager : dynamique, adapté à un conteneur ECS
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 500

; Logs vers stdout/stderr (capturés par CloudWatch via ECS)
catch_workers_output = yes
decorate_workers_output = no
access.log = /proc/self/fd/2
clear_env = no
